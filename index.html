<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Ball - Event Calendar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>Local Ball - Event Calendar</h1>
            </div>
        </div>
    </header>

    <section class="event-board">
        <div class="container">
            <h2>Softball Events Calendar</h2>
            
            <div class="event-controls">
                <button class="btn-primary" id="addEventBtn">Add New Event</button>
                <button class="btn-secondary" id="todayBtn">Go to Today</button>
            </div>

            <!-- Calendar Section -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonthBtn">&lt;</button>
                    <h3 id="monthYear">December 2024</h3>
                    <button id="nextMonthBtn">&gt;</button>
                </div>
                
                <div class="calendar-grid">
                    <div class="day-header">Sun</div>
                    <div class="day-header">Mon</div>
                    <div class="day-header">Tue</div>
                    <div class="day-header">Wed</div>
                    <div class="day-header">Thu</div>
                    <div class="day-header">Fri</div>
                    <div class="day-header">Sat</div>
                    
                    <!-- Calendar days will be added by JavaScript -->
                    <div id="calendarDays" class="calendar-days"></div>
                </div>
            </div>

            <!-- Event Form (hidden by default) -->
            <div id="eventForm" class="event-form" style="display: none;">
                <h3>Add New Event</h3>
                <input type="text" id="eventTitle" placeholder="Event Title (e.g., Tournament, Practice)">
                <input type="date" id="eventDate">
                <input type="time" id="eventTime">
                <input type="text" id="eventLocation" placeholder="Location">
                <select id="eventType">
                    <option value="tournament">Tournament</option>
                    <option value="practice">Practice</option>
                    <option value="tryout">Tryout</option>
                    <option value="game">Game</option>
                </select>
                <div class="form-buttons">
                    <button class="btn-primary" id="saveEventBtn">Save Event</button>
                    <button class="btn-secondary" id="cancelEventBtn">Cancel</button>
                </div>
            </div>

            <!-- Events List for Selected Day -->
            <div id="selectedDayEvents" class="selected-day-events">
                <h3 id="selectedDayTitle">Select a day to view events</h3>
                <div id="dayEventsList"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
